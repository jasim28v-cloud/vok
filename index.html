<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHΔDØW | VORTEX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Cairo:wght@400;700&display=swap');
        :root { --neon: #00f3ff; }
        body { margin: 0; background: #000; color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; }
        .feed-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .feed-container::-webkit-scrollbar { display: none; }
        .v-frame { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .ui-glass { background: rgba(0,0,0,0.5); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .xp-engine { position: fixed; top: 20px; left: 20px; z-index: 100; width: 120px; }
        .xp-bar { height: 3px; background: rgba(255,255,255,0.1); border-radius: 5px; margin-top: 5px; }
        #xp-progress { height: 100%; width: 0%; background: var(--neon); box-shadow: 0 0 10px var(--neon); transition: 0.5s; }
        .side-hub { position: absolute; left: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 15px; z-index: 50; }
        .action-btn { width: 50px; height: 50px; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .nav-bar { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 400px; height: 65px; border-radius: 20px; display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        #chat-window { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 500; display: none; flex-direction: column; }
    </style>
</head>
<body>

    <div class="xp-engine">
        <span id="rank-txt" class="text-[9px] font-[Orbitron] text-[var(--neon)] uppercase tracking-tighter">Syncing...</span>
        <div class="xp-bar"><div id="xp-progress"></div></div>
    </div>

    <main class="feed-container" id="video-grid">
        <div class="h-full flex flex-col items-center justify-center">
            <i class="fas fa-circle-notch fa-spin text-2xl text-[var(--neon)]"></i>
        </div>
    </main>

    <nav class="nav-bar ui-glass">
        <i class="fas fa-th-large text-lg" onclick="location.reload()"></i>
        <i class="fas fa-comment-dots opacity-40" onclick="openActionWithAd('chat')"></i>
        <div id="upload-btn" class="w-12 h-12 bg-white text-black rounded-xl flex items-center justify-center shadow-xl scale-110"><i class="fas fa-plus"></i></div>
        <i class="fas fa-paper-plane opacity-40" onclick="openActionWithAd('share')"></i>
        <i class="fas fa-user-secret opacity-40" onclick="openActionWithAd('profile')"></i>
    </nav>

    <div id="chat-window">
        <div class="p-4 border-b border-white/10 flex justify-between items-center">
            <span class="font-[Orbitron] text-[var(--neon)]">ENCRYPTED_CHAT</span>
            <i class="fas fa-times p-2" onclick="closeChat()"></i>
        </div>
        <div id="msg-stream" class="flex-1 p-4 overflow-y-auto space-y-3"></div>
        <div class="p-4 flex gap-2">
            <input type="text" id="chat-input" class="flex-1 bg-white/5 border border-white/10 rounded-lg p-3 outline-none" placeholder="Message...">
            <button onclick="pushMsg()" class="text-[var(--neon)] px-3"><i class="fas fa-arrow-up"></i></button>
        </div>
    </div>

    <script>
        const NODE_ID = localStorage.getItem('vortex_uid') || 'VX-' + Math.random().toString(36).substr(2, 5).toUpperCase();
        localStorage.setItem('vortex_uid', NODE_ID);
        let xp = parseInt(localStorage.getItem('vortex_xp')) || 0;

        const firebaseConfig = { databaseURL: "https://forg-c693e-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const rtdb = firebase.database();

        const AD_URLS = [
            "https://www.effectivegatecpm.com/bxwxuk2f39?key=566216691dc8b76a740840e94f68f44c",
            "https://www.effectivegatecpm.com/k60w64w4gk?key=564f3d8cc4ac85949f218179b742495e"
        ];

        function openActionWithAd(type) {
            window.open(AD_URLS[Math.floor(Math.random() * AD_URLS.length)], '_blank');
            addXP(5);
            if(type === 'chat') document.getElementById('chat-window').style.display = 'flex';
            if(type === 'share' && navigator.share) navigator.share({title: 'Shadow Vortex', url: window.location.href});
        }

        function closeChat() { document.getElementById('chat-window').style.display = 'none'; }

        function addXP(n) {
            xp += n;
            localStorage.setItem('vortex_xp', xp);
            const lv = Math.floor(xp / 100) + 1;
            document.getElementById('rank-txt').innerText = `LEVEL ${lv} | CORE`;
            document.getElementById('xp-progress').style.width = (xp % 100) + "%";
        }
        addXP(0);

        rtdb.ref('videos').on('value', snap => {
            const grid = document.getElementById('video-grid');
            const data = snap.val();
            if(!data) return;
            grid.innerHTML = '';
            Object.keys(data).reverse().forEach(id => {
                const v = data[id];
                const sec = document.createElement('section');
                sec.className = 'v-frame';
                sec.innerHTML = `
                    <video loop playsinline src="${v.url}"></video>
                    <div class="side-hub">
                        <div class="action-btn ui-glass ${v.likedBy?.[NODE_ID] ? 'border-[var(--neon)] text-[var(--neon)]' : ''}" onclick="likePulse('${id}')">
                            <i class="fas fa-heart"></i>
                            <span class="text-[10px] font-bold mt-1">${v.likes || 0}</span>
                        </div>
                        <div class="action-btn ui-glass" onclick="openActionWithAd('chat')">
                            <i class="fas fa-comment"></i>
                        </div>
                    </div>
                `;
                grid.appendChild(sec);
            });
            initObserver();
        });

        function likePulse(id) {
            openActionWithAd('like');
            rtdb.ref(`videos/${id}`).transaction(v => {
                if(v) {
                    v.likedBy = v.likedBy || {};
                    if(v.likedBy[NODE_ID]) { v.likes--; delete v.likedBy[NODE_ID]; }
                    else { v.likes++; v.likedBy[NODE_ID] = true; }
                }
                return v;
            });
        }

        const cloudConfig = { cloudName: "dfscughol", uploadPreset: "update_vk" };
        const uploader = cloudinary.createUploadWidget({ ...cloudConfig, sources: ['local'] }, (err, res) => {
            if (res.event === "success") {
                rtdb.ref('videos').push({ url: res.info.secure_url, sender: NODE_ID, likes: 0, time: Date.now() });
                addXP(50);
            }
        });

        document.getElementById("upload-btn").onclick = () => uploader.open();

        function pushMsg() {
            const inp = document.getElementById('chat-input');
            if(inp.value.trim()) {
                rtdb.ref('global_chat').push({user: NODE_ID, msg: inp.value});
                inp.value = '';
                addXP(2);
            }
        }

        rtdb.ref('global_chat').limitToLast(15).on('value', s => {
            const box = document.getElementById('msg-stream');
            box.innerHTML = '';
            const d = s.val();
            if(d) Object.values(d).forEach(m => {
                const div = document.createElement('div');
                div.className = 'p-3 ui-glass rounded-xl';
                div.innerHTML = `<span class="text-[8px] text-[var(--neon)] block">${m.user}</span><p class="text-sm">${m.msg}</p>`;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });

        function initObserver() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(e => {
                    const vid = e.target.querySelector('video');
                    if(e.isIntersecting) {
                        vid.play().catch(()=>{});
                        const colors = ['#00f3ff', '#ff00ff', '#00ff88', '#ffff00'];
                        document.documentElement.style.setProperty('--neon', colors[Math.floor(Math.random()*colors.length)]);
                    } else { vid.pause(); vid.currentTime = 0; }
                });
            }, { threshold: 0.6 });
            document.querySelectorAll('.v-frame').forEach(f => obs.observe(f));
        }

        document.addEventListener('click', () => { document.querySelectorAll('video').forEach(v => v.muted = false); }, { once: true });
    </script>
</body>
</html>
