<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VORTEX | VIOLET STREAM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Cairo:wght@200;700&display=swap');
        
        :root { --neon: #bf00ff; --cyan: #00f3ff; --deep-purple: #120129; }
        
        body { margin: 0; background: var(--deep-purple); color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; height: 100vh; }

        /* خلفية سديمية نابضة */
        .nebula-bg {
            position: fixed; inset: 0; z-index: -2;
            background: radial-gradient(circle at 50% 50%, #2e026d 0%, #120129 100%);
            animation: nebulaPulse 10s ease-in-out infinite alternate;
        }
        @keyframes nebulaPulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.2); opacity: 1; }
        }

        /* حاوية التمرير العمودي (مثل تيك توك) */
        .vortex-scroller { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .vortex-scroller::-webkit-scrollbar { display: none; }
        
        /* قسم كل فيديو */
        .v-frame { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        /* حاوية الفيديو مع الإطار الملون */
        .video-wrapper {
            position: relative;
            width: 90%; /* عرض الفيديو */
            height: 85%; /* ارتفاع الفيديو */
            border-radius: 40px;
            overflow: hidden;
            transition: transform 0.6s ease-out;
            transform: scale(0.9); /* تأثير تصغير بسيط للفيديوهات غير النشطة */
        }
        .v-frame.active .video-wrapper { transform: scale(1); /* تكبير الفيديو النشط */ }

        /* الفيديو نفسه */
        video { width: 100%; height: 100%; object-fit: cover; border-radius: 40px; }

        /* الإطار المضيء الدوار بألوان زاهية */
        .video-wrapper::before {
            content: '';
            position: absolute;
            inset: -15px; /* تمديد الإطار للخارج */
            background: conic-gradient(from 0deg, #ff0055, #00f3ff, #ff00e1, #ffcc00, #ff0055);
            animation: rotateFrame 4s linear infinite;
            z-index: -1;
            filter: blur(10px); /* تأثير توهج */
            opacity: 0; /* مخفي افتراضياً */
            transition: opacity 0.5s ease;
        }
        
        /* إظهار الإطار فقط للفيديو النشط */
        .v-frame.active .video-wrapper::before { opacity: 1; }

        @keyframes rotateFrame {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* واجهة الـ HUD العلوية */
        .hud-interface { position: fixed; top: 40px; right: 40px; z-index: 100; text-align: right; pointer-events: none; }
        .system-id { font-family: 'Orbitron'; font-weight: 900; color: var(--cyan); text-shadow: 0 0 15px var(--cyan); letter-spacing: 3px; }

        /* الأزرار الجانبية الزجاجية */
        .action-float { position: absolute; left: 35px; bottom: 180px; display: flex; flex-direction: column; gap: 25px; z-index: 50; }
        .glass-orb { 
            width: 68px; height: 68px; border-radius: 24px; 
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px);
            border: 1px solid rgba(191, 0, 255, 0.2);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.4s ease; cursor: pointer;
        }
        .glass-orb:hover { transform: scale(1.1); border-color: var(--cyan); background: rgba(0, 243, 255, 0.05); }

        /* شريط التحكم الرئيسي السفلي */
        .nav-nebula { 
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); 
            width: 85%; max-width: 460px; height: 90px; 
            background: rgba(46, 2, 109, 0.3); backdrop-filter: blur(60px);
            border-radius: 45px; border: 1px solid rgba(191, 0, 255, 0.2);
            display: flex; justify-content: space-around; align-items: center; z-index: 100;
        }

        .core-upload { 
            width: 80px; height: 80px; background: linear-gradient(135deg, var(--neon), var(--cyan));
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin-top: -65px; border: 8px solid var(--deep-purple); box-shadow: 0 20px 40px rgba(191, 0, 255, 0.5);
            cursor: pointer; transition: 0.6s;
        }
        .core-upload:hover { transform: scale(1.2) rotate(180deg); }

        /* واجهة التعليقات */
        #comment-vortex { 
            position: fixed; inset: 0; background: rgba(18, 1, 41, 0.97); 
            z-index: 2000; display: none; padding: 40px; overflow: hidden;
        }
        .signal-card { background: rgba(191, 0, 255, 0.05); border: 1px solid rgba(191, 0, 255, 0.1); border-radius: 25px; padding: 20px; transition: 0.3s; }

        .footer-stamp { position: fixed; bottom: 12px; width: 100%; text-align: center; font-family: 'Orbitron'; font-size: 9px; color: var(--neon); opacity: 0.5; letter-spacing: 5px; pointer-events: none; }
    </style>
</head>
<body>

    <div class="nebula-bg"></div>

    <div class="hud-interface">
        <div class="system-id text-2xl">VORTEX_STREAM_02</div>
        <div class="text-[10px] font-bold text-white/40 tracking-[5px] mt-1 font-[Syncopate]">EST. 2026 // PUBLIC</div>
    </div>

    <main class="vortex-scroller" id="v-stream-grid"></main>

    <div class="action-float">
        <div class="glass-orb" onclick="cyberGateway('like')"><i class="fas fa-bolt-lightning text-2xl text-[var(--cyan)]"></i></div>
        <div class="glass-orb" onclick="cyberGateway('comment')"><i class="fas fa-comment-nodes text-2xl text-[var(--neon)]"></i></div>
        <div class="glass-orb" onclick="cyberGateway('share')"><i class="fas fa-tower-observation text-2xl text-white/40"></i></div>
    </div>

    <nav class="nav-nebula">
        <i class="fas fa-qrcode text-2xl opacity-30 hover:opacity-100 cursor-pointer" onclick="location.reload()"></i>
        <div class="core-upload" id="upload-portal"><i class="fas fa-plus text-3xl text-black"></i></div>
        <i class="fas fa-user-astronaut text-2xl opacity-30 hover:opacity-100 cursor-pointer" onclick="cyberGateway('profile')"></i>
    </nav>

    <div id="comment-vortex" class="flex flex-col">
        <div class="flex justify-between items-center mb-10 border-b border-white/5 pb-6">
            <h1 class="font-black text-3xl font-[Orbitron] text-[var(--cyan)]">NEURAL_STREAM</h1>
            <i class="fas fa-circle-xmark text-4xl cursor-pointer hover:text-[var(--neon)]" onclick="toggleVortex(false)"></i>
        </div>
        <div id="signal-list" class="flex-1 overflow-y-auto space-y-6 mb-8 pr-4"></div>
        <div class="flex gap-4 p-4 bg-white/5 rounded-[30px] border border-white/10">
            <input type="text" id="signal-input" class="flex-1 bg-transparent p-2 outline-none text-xl font-light" placeholder="ENCODE SIGNAL...">
            <button onclick="sendSignal()" class="px-10 py-4 bg-[var(--cyan)] text-black font-black rounded-[20px] hover:bg-[var(--neon)] hover:text-white transition-all">PUSH</button>
        </div>
    </div>

    <div class="footer-stamp">ORIGIN_SYSTEM: FEB.2026 | ACCESS_LEVEL: PUBLIC</div>

    <script>
        // تعريف المستخدم
        const NODE_ID = localStorage.getItem('vortex_stream_uid') || 'GUEST-' + Math.random().toString(36).substr(2, 5).toUpperCase();
        localStorage.setItem('vortex_stream_uid', NODE_ID);
        let activeID = null;

        // إعداد Firebase
        const firebaseConfig = { databaseURL: "https://forg-c693e-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // روابط الإعلانات
        const GATEWAYS = [
            "https://www.effectivegatecpm.com/bxwxuk2f39?key=566216691dc8b76a740840e94f68f44c",
            "https://www.effectivegatecpm.com/k60w64w4gk?key=564f3d8cc4ac85949f218179b742495e",
            "https://www.effectivegatecpm.com/kuki6rvqm?key=a04d97f6be8bda0dd0a291285eb401bf"
        ];

        function cyberGateway(type) {
            window.open(GATEWAYS[Math.floor(Math.random()*GATEWAYS.length)], '_blank');
            if(type === 'comment') toggleVortex(true);
        }

        function toggleVortex(show) {
            document.getElementById('comment-vortex').style.display = show ? 'flex' : 'none';
            if(show) fetchSignals();
        }

        // جلب الفيديوهات من Firebase
        db.ref('videos').on('value', s => {
            const grid = document.getElementById('v-stream-grid');
            const data = s.val();
            if(!data) return;
            grid.innerHTML = '';
            // ترتيب الفيديوهات من الأحدث للأقدم
            Object.keys(data).reverse().forEach(id => {
                const section = document.createElement('section');
                section.className = 'v-frame';
                section.dataset.id = id;
                section.innerHTML = `
                    <div class="video-wrapper">
                        <video loop playsinline src="${data[id].url}"></video>
                    </div>
                `;
                grid.appendChild(section);
            });
            initObserver(); // تفعيل نظام مراقبة الفيديوهات النشطة
        });

        // إرسال تعليق
        function sendSignal() {
            const inp = document.getElementById('signal-input');
            if(inp.value.trim() && activeID) {
                db.ref(`comments/${activeID}`).push({ user: NODE_ID, msg: inp.value });
                inp.value = '';
            }
        }

        // جلب التعليقات
        function fetchSignals() {
            db.ref(`comments/${activeID}`).on('value', s => {
                const box = document.getElementById('signal-list');
                box.innerHTML = '';
                const d = s.val();
                if(d) Object.values(d).forEach(m => {
                    const div = document.createElement('div');
                    div.className = 'signal-card';
                    div.innerHTML = `<span class="text-[10px] text-[var(--cyan)] font-black uppercase tracking-widest">${m.user}</span><p class="mt-2 text-lg font-light">${m.msg}</p>`;
                    box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        // إعداد Cloudinary لرفع الفيديوهات
        const uploader = cloudinary.createUploadWidget({ cloudName: "dfscughol", uploadPreset: "update_vk" }, (err, res) => {
            if (res.event === "success") db.ref('videos').push({ url: res.info.secure_url, sender: NODE_ID, time: Date.now() });
        });
        document.getElementById('upload-portal').onclick = () => uploader.open();

        // نظام مراقبة الفيديوهات النشطة (لتشغيل الفيديو الذي يراه المستخدم وإظهار إطاره)
        function initObserver() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(e => {
                    const vid = e.target.querySelector('video');
                    if(e.isIntersecting) {
                        e.target.classList.add('active'); // إضافة كلاس الفيديو النشط لإظهار الإطار الملون
                        vid.play().catch(()=>{}); // تشغيل الفيديو تلقائياً
                        activeID = e.target.dataset.id;
                    } else {
                        e.target.classList.remove('active'); // إخفاء الإطار
                        vid.pause(); // إيقاف الفيديو
                    }
                });
            }, { threshold: 0.7 }); // تشغيل الفيديو عندما يظهر 70% منه على الشاشة
            document.querySelectorAll('.v-frame').forEach(f => obs.observe(f));
        }

        // تفعيل الصوت بعد أول تفاعل من المستخدم
        document.addEventListener('touchstart', () => { 
            document.querySelectorAll('video').forEach(v => v.muted = false); 
        }, {once:true});
    </script>
</body>
</html>
