<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VORTEX | VIOLET DIMENSION 2099</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Cairo:wght@200;700&display=swap');
        
        :root { --neon: #bf00ff; --cyan: #00f3ff; --deep-purple: #0f011d; }
        
        body { margin: 0; background: var(--deep-purple); color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; height: 100vh; }

        /* سديم بنفسجي متحرك في الخلفية */
        #nebula-canvas { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at center, #1a023d 0%, #0a0118 100%); }

        .vortex-scroll { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; perspective: 1200px; }
        .vortex-scroll::-webkit-scrollbar { display: none; }
        
        .v-frame { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        /* تصميم الفيديو ككبسولة زمنية */
        video { 
            width: 90%; height: 82%; object-fit: cover; 
            border-radius: 50px; border: 2px solid rgba(191, 0, 255, 0.2);
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(191, 0, 255, 0.2);
            transition: 1s cubic-bezier(0.2, 0.8, 0.2, 1);
            transform: rotateY(15deg) scale(0.9);
            filter: brightness(0.7) saturate(1.2);
        }
        .v-frame.active video { transform: rotateY(0deg) scale(1.05); filter: brightness(1); border-color: var(--cyan); }

        .hud-top { position: fixed; top: 40px; right: 30px; z-index: 100; text-align: right; }
        .glitch-id { font-family: 'Orbitron'; font-weight: 900; color: var(--cyan); letter-spacing: 2px; text-shadow: 0 0 10px var(--cyan); animation: pulse 2s infinite; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .floating-actions { position: absolute; left: 30px; bottom: 160px; display: flex; flex-direction: column; gap: 25px; z-index: 50; }
        .action-sphere { 
            width: 65px; height: 65px; border-radius: 50%; 
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px);
            border: 1px solid rgba(191, 0, 255, 0.3);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(191, 0, 255, 0.1);
            transition: 0.4s; cursor: pointer;
        }
        .action-sphere:hover { border-color: var(--cyan); box-shadow: 0 0 30px var(--cyan); transform: scale(1.1) translateY(-5px); }

        .nav-bridge { 
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); 
            width: 85%; max-width: 440px; height: 85px; 
            background: rgba(26, 2, 61, 0.4); backdrop-filter: blur(50px);
            border-radius: 40px; border: 1px solid rgba(191, 0, 255, 0.2);
            display: flex; justify-content: space-around; align-items: center; z-index: 100;
        }

        .portal-btn { 
            width: 75px; height: 75px; background: linear-gradient(45deg, var(--neon), var(--cyan));
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin-top: -60px; border: 6px solid var(--deep-purple); box-shadow: 0 15px 35px rgba(191, 0, 255, 0.6);
            cursor: pointer; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .portal-btn:hover { transform: scale(1.2) rotate(360deg); }

        #data-stream { 
            position: fixed; inset: 0; background: rgba(15, 1, 29, 0.96); 
            z-index: 2000; display: none; padding: 40px; 
            transition: 0.5s ease-in-out;
        }
        .violet-input { background: rgba(191, 0, 255, 0.05); border: 1px solid rgba(191, 0, 255, 0.2); border-radius: 20px; padding: 20px; color: #fff; width: 100%; outline: none; transition: 0.3s; }
        .violet-input:focus { border-color: var(--cyan); box-shadow: 0 0 15px var(--cyan); }

        .footer-log { position: fixed; bottom: 10px; width: 100%; text-align: center; font-family: 'Orbitron'; font-size: 8px; color: var(--neon); opacity: 0.4; letter-spacing: 6px; pointer-events: none; }
    </style>
</head>
<body>

    <canvas id="nebula-canvas"></canvas>

    <div class="hud-top">
        <div class="glitch-id text-xl tracking-tighter">NEO_VORTEX_CORE</div>
        <div class="text-[10px] font-bold text-white/30 font-[Syncopate] mt-1">EST. MARCH_2026 // PUBLIC_SERVER</div>
    </div>

    <main class="vortex-scroll" id="main-grid"></main>

    <div class="floating-actions">
        <div class="action-sphere" onclick="runMatrixAd('like')"><i class="fas fa-heart-circle-bolt text-2xl text-[var(--neon)]"></i></div>
        <div class="action-sphere" onclick="runMatrixAd('comment')"><i class="fas fa-comment-medical text-2xl text-[var(--cyan)]"></i></div>
        <div class="action-sphere" onclick="runMatrixAd('share')"><i class="fas fa-tower-broadcast text-2xl text-white/50"></i></div>
    </div>

    <nav class="nav-bridge">
        <i class="fas fa-microchip text-2xl opacity-30 hover:opacity-100 transition-opacity" onclick="location.reload()"></i>
        <div class="portal-btn" id="upload-trigger"><i class="fas fa-plus text-3xl text-black"></i></div>
        <i class="fas fa-dna text-2xl opacity-30 hover:opacity-100 transition-opacity" onclick="runMatrixAd('profile')"></i>
    </nav>

    <div id="data-stream" class="flex flex-col">
        <div class="flex justify-between items-center mb-10 border-b border-[var(--neon)] pb-5">
            <h1 class="font-black text-2xl font-[Orbitron] text-[var(--neon)] uppercase">Sub_Space_Feedback</h1>
            <i class="fas fa-power-off text-3xl cursor-pointer hover:text-red-500" onclick="toggleData(false)"></i>
        </div>
        <div id="msg-orbit" class="flex-1 overflow-y-auto space-y-5 mb-8 scrollbar-hide"></div>
        <div class="flex gap-4 p-2 bg-white/5 rounded-3xl">
            <input type="text" id="msg-input" class="violet-input" placeholder="ENCODE SIGNAL...">
            <button onclick="pushSignal()" class="px-10 bg-[var(--neon)] text-white font-black rounded-2xl hover:bg-[var(--cyan)] transition-colors">PUSH</button>
        </div>
    </div>

    <div class="footer-log">GENESIS_DATE: 2026.03.01 | NODE: GLOBAL_ACCESS</div>

    <script>
        const NODE_UID = localStorage.getItem('vortex_2099_uid') || 'VX-' + Math.random().toString(36).substr(2, 5).toUpperCase();
        localStorage.setItem('vortex_2099_uid', NODE_UID);
        let currentTarget = null;

        const firebaseConfig = { databaseURL: "https://forg-c693e-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const AD_GATEWAY = [
            "https://www.effectivegatecpm.com/bxwxuk2f39?key=566216691dc8b76a740840e94f68f44c",
            "https://www.effectivegatecpm.com/k60w64w4gk?key=564f3d8cc4ac85949f218179b742495e",
            "https://www.effectivegatecpm.com/kuki6rvqm?key=a04d97f6be8bda0dd0a291285eb401bf"
        ];

        function runMatrixAd(type) {
            window.open(AD_GATEWAY[Math.floor(Math.random()*AD_GATEWAY.length)], '_blank');
            if(type === 'comment') toggleData(true);
        }

        function toggleData(show) {
            const el = document.getElementById('data-stream');
            el.style.display = show ? 'flex' : 'none';
            if(show) fetchSignals();
        }

        db.ref('videos').on('value', s => {
            const grid = document.getElementById('main-grid');
            const data = s.val();
            if(!data) return;
            grid.innerHTML = '';
            Object.keys(data).reverse().forEach(id => {
                const section = document.createElement('section');
                section.className = 'v-frame';
                section.dataset.id = id;
                section.innerHTML = `<video loop playsinline src="${data[id].url}"></video>`;
                grid.appendChild(section);
            });
            initVortexSync();
        });

        function pushSignal() {
            const inp = document.getElementById('msg-input');
            if(inp.value.trim() && currentTarget) {
                db.ref(`comments/${currentTarget}`).push({ user: NODE_UID, msg: inp.value });
                inp.value = '';
            }
        }

        function fetchSignals() {
            db.ref(`comments/${currentTarget}`).on('value', s => {
                const box = document.getElementById('msg-orbit');
                box.innerHTML = '';
                const d = s.val();
                if(d) Object.values(d).forEach(m => {
                    const div = document.createElement('div');
                    div.className = 'p-5 bg-white/5 border-l-4 border-[var(--cyan)] rounded-xl backdrop-blur-md';
                    div.innerHTML = `<span class="text-[10px] text-[var(--neon)] font-black uppercase tracking-widest">${m.user}</span><p class="mt-2 text-md text-white/90">${m.msg}</p>`;
                    box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        const uploader = cloudinary.createUploadWidget({ cloudName: "dfscughol", uploadPreset: "update_vk" }, (err, res) => {
            if (res.event === "success") db.ref('videos').push({ url: res.info.secure_url, sender: NODE_UID, time: Date.now() });
        });
        document.getElementById('upload-trigger').onclick = () => uploader.open();

        function initVortexSync() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(e => {
                    const vid = e.target.querySelector('video');
                    if(e.isIntersecting) {
                        e.target.classList.add('active');
                        vid.play();
                        currentTarget = e.target.dataset.id;
                    } else {
                        e.target.classList.remove('active');
                        vid.pause();
                    }
                });
            }, { threshold: 0.7 });
            document.querySelectorAll('.v-frame').forEach(f => obs.observe(f));
        }

        // تحريك خلفية السديم البنفسجي (Nebula Canvas)
        const canvas = document.getElementById('nebula-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let stars = Array.from({length: 100}, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 2,
            o: Math.random(),
            s: Math.random() * 0.02
        }));

        function animateNebula() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            stars.forEach(s => {
                ctx.fillStyle = `rgba(191, 0, 255, ${s.o})`;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
                ctx.fill();
                s.o += s.s;
                if(s.o > 1 || s.o < 0) s.s = -s.s;
            });
            requestAnimationFrame(animateNebula);
        }
        animateNebula();

        document.addEventListener('touchstart', () => { document.querySelectorAll('video').forEach(v => v.muted = false); }, {once:true});
    </script>
</body>
</html>
