<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VORTEX | NEURAL LINK 2099</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Cairo:wght@200;700&display=swap');
        
        :root { --neon: #bc00ff; --cyan: #00f3ff; --bg: #05000a; }
        
        body { margin: 0; background: var(--bg); color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; height: 100vh; }

        /* خلفية الجزيئات المستقبلية */
        #canvas-nebula { position: fixed; inset: 0; z-index: -1; opacity: 0.6; }

        .vortex-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; perspective: 1000px; }
        .vortex-container::-webkit-scrollbar { display: none; }
        
        .v-frame { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        /* تأثير زجاجي مع انحناء مستقبلي */
        video { 
            width: 92%; height: 85%; object-fit: cover; 
            border-radius: 40px; border: 1px solid rgba(188, 0, 255, 0.3);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.9);
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .v-frame.active video { transform: scale(1.05) rotateX(0deg); }

        .hud-display { position: fixed; top: 40px; right: 30px; z-index: 100; text-align: right; pointer-events: none; }
        .glitch-text { font-family: 'Orbitron', sans-serif; font-weight: 900; color: var(--cyan); text-shadow: 2px 0 var(--neon); animation: glitch 3s infinite; }

        @keyframes glitch {
            0% { clip-path: inset(10% 0 30% 0); transform: skew(5deg); }
            5% { clip-path: inset(80% 0 1% 0); transform: skew(-5deg); }
            10% { clip-path: inset(10% 0 30% 0); transform: skew(0); }
        }

        .side-orb { position: absolute; left: 25px; bottom: 150px; display: flex; flex-direction: column; gap: 30px; z-index: 50; }
        .cyber-btn { 
            width: 60px; height: 60px; border-radius: 50%; 
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 243, 255, 0.2);
            display: flex; items-center justify-content: center;
            box-shadow: inset 0 0 15px rgba(0, 243, 255, 0.1);
            transition: 0.5s; cursor: pointer;
        }
        .cyber-btn:hover { border-color: var(--cyan); box-shadow: 0 0 20px var(--cyan); transform: rotate(15deg) scale(1.1); }

        .nav-core { 
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 450px; height: 80px; 
            background: rgba(10, 0, 20, 0.7); backdrop-filter: blur(40px);
            border-radius: 100px; border: 1px solid rgba(188, 0, 255, 0.2);
            display: flex; justify-content: space-around; align-items: center; z-index: 100;
        }

        .upload-portal { 
            width: 70px; height: 70px; background: linear-gradient(135deg, var(--cyan), var(--neon));
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin-top: -50px; border: 5px solid var(--bg); box-shadow: 0 10px 30px rgba(188, 0, 255, 0.5);
            transition: 0.5s; cursor: pointer;
        }
        .upload-portal:hover { transform: scale(1.2) rotate(180deg); }

        #comment-vortex { 
            position: fixed; inset: 0; background: rgba(5, 0, 10, 0.98); 
            z-index: 2000; display: none; padding: 40px; clip-path: circle(0% at 50% 90%);
            transition: 0.8s cubic-bezier(0.8, 0, 0.2, 1);
        }
        #comment-vortex.open { clip-path: circle(150% at 50% 90%); display: flex; flex-direction: column; }

        .footer-line { position: fixed; bottom: 10px; width: 100%; text-align: center; font-family: 'Orbitron'; font-size: 8px; opacity: 0.3; letter-spacing: 5px; }
    </style>
</head>
<body>

    <canvas id="canvas-nebula"></canvas>

    <div class="hud-display">
        <div class="glitch-text text-xl">SHΔDØW_OS_v9.0</div>
        <div class="text-[9px] tracking-[4px] opacity-50">SYNC_STATUS: ENCRYPTED</div>
        <div class="text-[9px] tracking-[4px] text-[var(--cyan)]">EST. 2026 // NODE_ACTIVE</div>
    </div>

    <main class="vortex-container" id="video-grid"></main>

    <div class="side-orb">
        <div class="cyber-btn" onclick="cyberAction('like')"><i class="fas fa-heart-pulse text-[var(--neon)]"></i></div>
        <div class="cyber-btn" onclick="cyberAction('comment')"><i class="fas fa-satellite-dish text-[var(--cyan)]"></i></div>
        <div class="cyber-btn" onclick="cyberAction('share')"><i class="fas fa-biohazard"></i></div>
    </div>

    <nav class="nav-core">
        <i class="fas fa-terminal opacity-30" onclick="location.reload()"></i>
        <div class="upload-portal" id="btn-upload"><i class="fas fa-atom text-2xl animate-spin-slow"></i></div>
        <i class="fas fa-user-astronaut opacity-30" onclick="cyberAction('profile')"></i>
    </nav>

    <div id="comment-vortex">
        <div class="flex justify-between items-center mb-10">
            <h1 class="font-black text-2xl tracking-tighter">NEURAL_FEEDBACK</h1>
            <i class="fas fa-door-open text-3xl cursor-pointer" onclick="toggleVortex(false)"></i>
        </div>
        <div id="comm-stream" class="flex-1 overflow-y-auto space-y-6 mb-6"></div>
        <div class="flex gap-4">
            <input type="text" id="comm-input" class="flex-1 bg-white/5 border-b-2 border-[var(--cyan)] p-5 outline-none font-bold" placeholder="ENCODE MESSAGE...">
            <button onclick="sendSignal()" class="px-8 bg-[var(--cyan)] text-black font-black rounded-full">SEND</button>
        </div>
    </div>

    <div class="footer-line">ORIGIN_POINT: 01.03.2026 | SYSTEM_TIME: REALTIME</div>

    <script>
        const UID = localStorage.getItem('vortex_uid') || 'PHANTOM-' + Math.random().toString(36).substr(2, 4).toUpperCase();
        localStorage.setItem('vortex_uid', UID);
        let activeVideo = null;

        const firebaseConfig = { databaseURL: "https://forg-c693e-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const AD_LINKS = [
            "https://www.effectivegatecpm.com/bxwxuk2f39?key=566216691dc8b76a740840e94f68f44c",
            "https://www.effectivegatecpm.com/k60w64w4gk?key=564f3d8cc4ac85949f218179b742495e",
            "https://www.effectivegatecpm.com/kuki6rvqm?key=a04d97f6be8bda0dd0a291285eb401bf"
        ];

        function cyberAction(type) {
            window.open(AD_LINKS[Math.floor(Math.random()*AD_LINKS.length)], '_blank');
            if(type === 'comment') toggleVortex(true);
        }

        function toggleVortex(show) {
            const v = document.getElementById('comment-vortex');
            if(show) { v.style.display = 'flex'; setTimeout(() => v.classList.add('open'), 10); loadSignals(); }
            else { v.classList.remove('open'); setTimeout(() => v.style.display = 'none', 800); }
        }

        db.ref('videos').on('value', s => {
            const grid = document.getElementById('video-grid');
            const data = s.val();
            if(!data) return;
            grid.innerHTML = '';
            Object.keys(data).reverse().forEach(id => {
                const div = document.createElement('section');
                div.className = 'v-frame';
                div.dataset.id = id;
                div.innerHTML = `<video loop playsinline src="${data[id].url}"></video>`;
                grid.appendChild(div);
            });
            initObserver();
        });

        function sendSignal() {
            const inp = document.getElementById('comm-input');
            if(inp.value.trim() && activeVideo) {
                db.ref(`comments/${activeVideo}`).push({ user: UID, msg: inp.value });
                inp.value = '';
            }
        }

        function loadSignals() {
            db.ref(`comments/${activeVideo}`).on('value', s => {
                const box = document.getElementById('comm-stream');
                box.innerHTML = '';
                const d = s.val();
                if(d) Object.values(d).forEach(m => {
                    const msg = document.createElement('div');
                    msg.className = 'p-5 bg-white/5 border-r-4 border-[var(--neon)] rounded-xl';
                    msg.innerHTML = `<span class="text-[10px] text-[var(--cyan)] font-black uppercase">${m.user}</span><p class="mt-2 text-lg">${m.msg}</p>`;
                    box.appendChild(msg);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        const uploader = cloudinary.createUploadWidget({ cloudName: "dfscughol", uploadPreset: "update_vk" }, (err, res) => {
            if (res.event === "success") db.ref('videos').push({ url: res.info.secure_url, sender: UID });
        });
        document.getElementById('btn-upload').onclick = () => uploader.open();

        function initObserver() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(e => {
                    const vid = e.target.querySelector('video');
                    if(e.isIntersecting) {
                        e.target.classList.add('active');
                        vid.play();
                        activeVideo = e.target.dataset.id;
                    } else {
                        e.target.classList.remove('active');
                        vid.pause();
                    }
                });
            }, { threshold: 0.7 });
            document.querySelectorAll('.v-frame').forEach(f => obs.observe(f));
        }

        // تحريك خلفية الجزيئات (Canvas Nebula)
        const canvas = document.getElementById('canvas-nebula');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = Array.from({length: 80}, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            s: Math.random() * 2,
            v: Math.random() * 0.5
        }));
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            particles.forEach(p => {
                ctx.fillStyle = '#bc00ff';
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.s, 0, Math.PI*2);
                ctx.fill();
                p.y -= p.v;
                if(p.y < 0) p.y = canvas.height;
            });
            requestAnimationFrame(draw);
        }
        draw();

        document.addEventListener('click', () => { document.querySelectorAll('video').forEach(v => v.muted = false); }, {once:true});
    </script>
</body>
</html>
