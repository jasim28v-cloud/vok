<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>SHΔDØW GENESIS | ELITE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Cairo:wght@300;600;900&display=swap');
        
        :root { --glow: #00f3ff; --dark-bg: #020202; }
        body { margin: 0; background: var(--dark-bg); color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; height: 100vh; width: 100vw; }
        
        .premium-scroller { height: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .premium-scroller::-webkit-scrollbar { display: none; }
        
        .v-segment { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }

        .deep-glass { background: rgba(10, 10, 10, 0.4); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.08); }
        
        .xp-display { position: fixed; top: env(safe-area-inset-top, 30px); left: 30px; z-index: 100; padding: 10px; border-left: 2px solid var(--glow); }
        .xp-line { width: 140px; height: 2px; background: rgba(255,255,255,0.05); margin-top: 8px; }
        #xp-bar { height: 100%; width: 0%; background: linear-gradient(90deg, transparent, var(--glow)); box-shadow: 0 0 15px var(--glow); transition: 0.8s; }

        .side-actions { position: absolute; right: 20px; bottom: 140px; display: flex; flex-direction: column; gap: 25px; z-index: 50; }
        .luxury-btn { width: 55px; height: 55px; border-radius: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.4s; }

        .nav-bridge { position: fixed; bottom: env(safe-area-inset-bottom, 30px); left: 50%; transform: translateX(-50%); width: 85%; max-width: 420px; height: 75px; border-radius: 30px; display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        
        .upload-diamond { width: 60px; height: 60px; background: #fff; color: #000; border-radius: 22px; transform: rotate(45deg); display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .upload-diamond i { transform: rotate(-45deg); }

        .footer-stamp { position: fixed; bottom: 5px; width: 100%; text-align: center; font-family: 'Syncopate', sans-serif; font-size: 7px; color: rgba(255,255,255,0.2); letter-spacing: 3px; z-index: 10; }
        
        /* زر تفعيل ملء الشاشة في البداية */
        #fs-overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="fs-overlay">
        <div class="upload-diamond mb-10" onclick="enterFullScreen()">
            <i class="fas fa-expand"></i>
        </div>
        <span class="font-[Syncopate] text-[10px] tracking-[5px] animate-pulse">TAP TO ENTER GRID</span>
    </div>

    <div class="xp-display">
        <div class="text-[10px] font-bold text-white/40 tracking-[4px] font-[Syncopate]">EST. 2026</div>
        <div id="rank-name" class="text-[11px] font-black text-[var(--glow)] mt-1">INITIALIZING...</div>
        <div class="xp-line"><div id="xp-bar"></div></div>
    </div>

    <main class="premium-scroller" id="video-stream">
        <div class="h-full flex flex-col items-center justify-center space-y-6">
            <i class="fas fa-shield-halved text-4xl text-[var(--glow)] animate-pulse"></i>
        </div>
    </main>

    <div class="side-actions">
        <div class="luxury-btn deep-glass" onclick="actionWithAd('like')"><i class="fas fa-heart"></i></div>
        <div class="luxury-btn deep-glass" onclick="actionWithAd('chat')"><i class="fas fa-comment-alt"></i></div>
        <div class="luxury-btn deep-glass" onclick="actionWithAd('share')"><i class="fas fa-share-nodes"></i></div>
    </div>

    <nav class="nav-bridge deep-glass">
        <i class="fas fa-ghost text-white/30" onclick="location.reload()"></i>
        <div class="upload-diamond" id="trigger-upload"><i class="fas fa-plus"></i></div>
        <i class="fas fa-user-tie text-white/30" onclick="actionWithAd('profile')"></i>
    </nav>

    <div class="footer-stamp">SHΔDØW GENESIS PROTOCOL v2.0</div>

    <script>
        // دالة الدخول في وضع ملء الشاشة وإخفاء واجهة المتصفح
        function enterFullScreen() {
            const doc = document.documentElement;
            if (doc.requestFullscreen) {
                doc.requestFullscreen();
            } else if (doc.mozRequestFullScreen) { // Firefox
                doc.mozRequestFullScreen();
            } else if (doc.webkitRequestFullscreen) { // Chrome, Safari, Opera
                doc.webkitRequestFullscreen();
            } else if (doc.msRequestFullscreen) { // IE/Edge
                doc.msRequestFullscreen();
            }
            
            document.getElementById('fs-overlay').style.display = 'none';
            // تشغيل الفيديوهات بعد التفاعل
            document.querySelectorAll('video').forEach(v => v.muted = false);
        }

        const UID = localStorage.getItem('shadow_v2_uid') || 'UX-' + Math.random().toString(36).substr(2, 6).toUpperCase();
        localStorage.setItem('shadow_v2_uid', UID);
        
        const firebaseConfig = { databaseURL: "https://forg-c693e-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const AD_LINKS = [
            "https://www.effectivegatecpm.com/bxwxuk2f39?key=566216691dc8b76a740840e94f68f44c",
            "https://www.effectivegatecpm.com/k60w64w4gk?key=564f3d8cc4ac85949f218179b742495e"
        ];

        function actionWithAd(type) {
            window.open(AD_LINKS[Math.floor(Math.random() * AD_LINKS.length)], '_blank');
        }

        db.ref('videos').on('value', snap => {
            const stream = document.getElementById('video-stream');
            const videos = snap.val();
            if(!videos) return;
            stream.innerHTML = '';
            Object.keys(videos).reverse().forEach(key => {
                const data = videos[key];
                const section = document.createElement('section');
                section.className = 'v-segment';
                section.innerHTML = `<video loop playsinline src="${data.url}"></video>`;
                stream.appendChild(section);
            });
            initMotion();
        });

        const cloudSettings = { cloudName: "dfscughol", uploadPreset: "update_vk" };
        const uploader = cloudinary.createUploadWidget({ ...cloudSettings, sources: ['local'] }, (err, res) => {
            if (res.event === "success") {
                db.ref('videos').push({ url: res.info.secure_url, sender: UID, created_at: Date.now() });
            }
        });

        document.getElementById("trigger-upload").onclick = () => uploader.open();

        function initMotion() {
            const observer = new IntersectionObserver(entries => {
                entries.forEach(e => {
                    const vid = e.target.querySelector('video');
                    if(e.isIntersecting) {
                        vid.play().catch(()=>{});
                    } else { vid.pause(); }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.v-segment').forEach(s => observer.observe(s));
        }
    </script>
</body>
</html>
